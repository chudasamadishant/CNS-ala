<!doctype html>
<html>
<head>
  <title>ALA-2 SHA</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="ala-page">
<div class="main-card">

  <h2>🔎 ALA-2: SHA Integrity Analyzer</h2>

  <form method="POST" class="card">

    <label>Original Text</label>
    <textarea name="text">{{ original_text }}</textarea>

    <label>Modified Text</label>
    <textarea name="changed_text">{{ changed_text }}</textarea>

    <button>Analyze</button>
  </form>

  {% if result %}
  <div class="result-box">

    <h3>Result</h3>

    <p><b>Original SHA-256:</b></p>
    <pre>{{ result.original_hashes.SHA256 }}</pre>

    <p><b>Modified SHA-256:</b></p>
    <pre>{{ result.changed_hashes.SHA256 }}</pre>

    <p><b>Status:</b> {{ 'Changed' if result.is_modified else 'Same' }}</p>

  </div>
  {% endif %}

  <a href="/">⬅ Back</a>

</div>
</body>
</html>
